{% extends "base.html" %}
{% block title %}Guest Registration — SecureDocs{% endblock %}
{% block content %}
<div class="form-card">
  <h1>Guest Access</h1>
  <p class="form-footer">Guests can view documents shared with them, but cannot upload or create documents.</p>
  <form method="post" action="/register-guest" autocomplete="off">
    <label for="username">Username</label>
    <input type="text" id="username" name="username"
           maxlength="20" required autocomplete="username"
           pattern="[a-zA-Z0-9_]+" title="Alphanumeric and underscore only">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email">

    <label for="password">Password</label>
    <input type="password" id="password" name="password"
           maxlength="128" required autocomplete="new-password">

    <label for="confirm_password">Confirm Password</label>
    <input type="password" id="confirm_password" name="confirm_password"
           maxlength="128" required autocomplete="new-password">

    <button type="submit" class="btn-primary">Create Guest Account</button>
  </form>
  <p class="form-footer">Want full access? <a href="/register">Register a full account</a></p>
  <p class="form-footer">Already have an account? <a href="/login">Log in</a></p>
</div>
{% endblock %}
